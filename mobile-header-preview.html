<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Header Design Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;900&display=swap');
        
        /* 模拟您项目中的自定义字体 AerialFaster */
        @font-face {
            font-family: 'AerialFaster';
            src: local('Arial Black'); /* 暂时用 Arial Black 替代预览 */
        }

        body {
            background-color: #02040a;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a2342 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #1e1b4b 0%, transparent 30%);
        }

        .glass-panel {
            background: rgba(11, 16, 32, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.9);
        }

        .text-gradient {
            background: linear-gradient(to right, #40ffaa, #6b73ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-pill-active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 15px rgba(107, 115, 255, 0.2);
            border: 1px solid rgba(107, 115, 255, 0.3);
        }
        
        .nav-pill-inactive {
            color: rgba(255, 255, 255, 0.6);
        }

        /* 模拟移动端容器 */
        .mobile-container {
            width: 100%;
            max-width: 430px; /* iPhone Max width */
            margin: 50px auto;
            border: 1px solid #333;
            height: 800px;
            position: relative;
            overflow: hidden;
            background-color: #02040a;
            border-radius: 40px;
            box-shadow: 0 0 0 10px #1a1a1a;
        }

        .preview-label {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="flex flex-col items-center gap-10 py-10">

        <!-- Option 1: Clean & Minimal (图标化 + 一体化导航) -->
        <div>
            <div class="preview-label">Design Option 1: Clean & Minimal</div>
            <div class="mobile-container">
                
                <!-- 模拟 Header 位置 -->
                <div class="fixed top-2 left-1/2 -translate-x-1/2 w-[95%] z-50">
                    <div class="glass-panel rounded-[24px] p-4 flex flex-col gap-4">
                        
                        <!-- 第一行：Logo + 工具图标 -->
                        <div class="flex items-center justify-between px-1">
                            <!-- Logo -->
                            <h1 class="text-2xl font-black text-gradient tracking-wide m-0 leading-none" style="font-family: sans-serif;">
                                TANZANITE
                            </h1>

                            <!-- Tools (No borders, just icons/text) -->
                            <div class="flex items-center gap-4">
                                <!-- Guides -->
                                <button class="text-white/70 hover:text-white transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                                </button>
                                
                                <!-- Language -->
                                <button class="text-white/70 hover:text-white transition-colors flex items-center gap-1">
                                    <span class="text-sm font-medium">EN</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                                </button>

                                <!-- Points/Share -->
                                <button class="text-white/70 hover:text-[#40ffaa] transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9Z"/></svg>
                                </button>
                            </div>
                        </div>

                        <!-- 第二行：主要导航 (Segmented Control Style) -->
                        <div class="bg-white/5 rounded-xl p-1 flex items-center justify-between relative">
                            <!-- Active Item -->
                            <button class="flex-1 py-2 rounded-lg text-xs font-medium text-white bg-white/10 shadow-sm text-center transition-all">
                                Products
                            </button>
                            
                            <button class="flex-1 py-2 rounded-lg text-xs font-medium text-white/60 hover:text-white text-center transition-all">
                                Support
                            </button>
                            
                            <button class="flex-1 py-2 rounded-lg text-xs font-medium text-white/60 hover:text-white text-center transition-all">
                                Company
                            </button>
                        </div>

                    </div>
                </div>

                <!-- 页面内容占位 -->
                <div class="pt-40 px-6">
                    <h2 class="text-white text-xl font-bold mb-2">Riders Photos</h2>
                    <div class="w-full aspect-square bg-slate-800 rounded-xl mb-4"></div>
                    <div class="w-full aspect-square bg-slate-800 rounded-xl"></div>
                </div>

            </div>
        </div>


        <!-- Option 2: Modern Outline (更精致的线条感，保留一点点框，但更轻) -->
        <div>
            <div class="preview-label">Design Option 2: Modern Outline</div>
            <div class="mobile-container">
                
                <div class="fixed top-2 left-1/2 -translate-x-1/2 w-[95%] z-50">
                    <div class="glass-panel rounded-[30px] px-5 py-4 flex flex-col gap-3">
                        
                        <!-- Logo Row -->
                        <div class="flex justify-center mb-1">
                             <h1 class="text-3xl font-black text-gradient tracking-wide m-0 leading-none" style="font-family: sans-serif;">
                                TANZANITE
                            </h1>
                        </div>

                        <!-- Actions Row -->
                        <div class="flex items-center justify-center gap-2">
                            <!-- Guides Pill -->
                            <button class="h-8 px-4 rounded-full border border-white/20 bg-white/5 text-[11px] font-medium text-white hover:bg-white/10 transition-all flex items-center gap-2">
                                <span>Guides</span>
                            </button>

                             <!-- Lang Pill -->
                            <button class="h-8 w-8 rounded-full border border-white/20 bg-white/5 flex items-center justify-center text-white hover:bg-white/10 transition-all">
                                <span class="text-[10px] font-bold">EN</span>
                            </button>

                            <!-- Share Pill -->
                            <button class="h-8 w-8 rounded-full border border-white/20 bg-white/5 flex items-center justify-center text-[#40ffaa] hover:bg-white/10 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9Z"/></svg>
                            </button>
                        </div>

                        <!-- Nav Row (Minimal Text) -->
                        <div class="flex items-center justify-center gap-6 pt-1 border-t border-white/5 mt-1">
                            <a href="#" class="text-xs font-semibold text-[#6b73ff] border-b border-[#6b73ff] pb-0.5">Products</a>
                            <a href="#" class="text-xs font-medium text-slate-400">Support</a>
                            <a href="#" class="text-xs font-medium text-slate-400">Company</a>
                        </div>

                    </div>
                </div>
                 <!-- 页面内容占位 -->
                <div class="pt-44 px-6">
                     <h2 class="text-white text-xl font-bold mb-2">Riders Photos</h2>
                    <div class="w-full aspect-square bg-slate-800 rounded-xl mb-4"></div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
