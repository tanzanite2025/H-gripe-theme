name: Frontend CI

on:
  push:
    branches: [master, main]
    paths:
      - "nuxt-i18n/**"
      - "go-backend/web/admin/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "nuxt-i18n/**"
      - "go-backend/web/admin/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: storefront
            path: nuxt-i18n
          - name: admin
            path: go-backend/web/admin
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.path }}
        run: npm run build
