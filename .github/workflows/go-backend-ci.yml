name: Go Backend CI

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'go-backend/**'
      - '.github/workflows/go-backend-ci.yml'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'go-backend/**'
      - '.github/workflows/go-backend-ci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: go-backend
          args: --timeout=5m
          only-new-issues: true

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tanzanite
          POSTGRES_PASSWORD: tanzanite_test
          POSTGRES_DB: tanzanite_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum

      - name: Install dependencies
        working-directory: go-backend
        run: go mod download

      - name: Run tests
        working-directory: go-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: tanzanite
          DB_PASSWORD: tanzanite_test
          DB_NAME: tanzanite_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./go-backend/coverage.txt
          flags: backend
          name: go-backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum

      - name: Build binary
        working-directory: go-backend
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-w -s -X main.Version=${GITHUB_SHA::8} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o server \
            ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tanzanite-api-binary
          path: go-backend/server
          retention-days: 7
