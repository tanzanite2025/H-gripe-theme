name: Publish Tanzanite Production Images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: tanzanite-production-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-backend/go.mod
          cache-dependency-path: go-backend/go.sum

      - name: Test backend
        working-directory: go-backend
        run: go test ./...

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            nuxt-i18n/package-lock.json
            go-backend/web/admin/package-lock.json

      - name: Build storefront
        working-directory: nuxt-i18n
        run: |
          npm ci
          npm run build

      - name: Build admin
        working-directory: go-backend/web/admin
        run: |
          npm ci
          npm run build

      - name: Validate production Compose
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: docker compose --env-file deployment/production.env.example -f compose.prod.yml config --quiet

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tanzanite-theme-api
            context: ./go-backend
            dockerfile: ./go-backend/Dockerfile
          - image: tanzanite-theme-storefront
            context: ./nuxt-i18n
            dockerfile: ./nuxt-i18n/Dockerfile
          - image: tanzanite-theme-admin
            context: ./go-backend/web/admin
            dockerfile: ./go-backend/web/admin/Dockerfile
          - image: tanzanite-theme-web
            context: ./deployment
            dockerfile: ./deployment/docker/web.Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=master
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true
