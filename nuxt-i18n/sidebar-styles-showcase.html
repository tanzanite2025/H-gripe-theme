<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Style C - Tanzanite Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* =========================================
           STYLE C: Tanzanite Ultimate
           ========================================= */
        .style-c {
            width: 360px;
            height: 900px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, #0f172a 0%, #000000 100%);
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* 搜索组件 */
        .search-panel-c {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .search-row-c {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-row-c .search-input-c {
            flex: 1;
            min-width: 0;
        }
        .search-row-c .btn-group {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .search-input-c {
            flex: 1;
            height: 38px;
            padding: 0 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }
        .search-input-c::placeholder { color: rgba(255,255,255,0.4); }
        .search-input-c:focus {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.05);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.15);
        }

        .search-btn-c {
            height: 38px;
            padding: 0 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
        }
        .search-btn-c.primary {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.3), rgba(59, 130, 246, 0.3));
            border-color: rgba(45, 212, 191, 0.5);
            color: #fff;
        }
        .search-btn-c.primary:hover {
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.5), rgba(59, 130, 246, 0.5));
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.3);
            transform: translateY(-1px);
        }
        .search-btn-c.secondary {
            background: transparent;
            border-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
        }
        .search-btn-c.secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.3);
            color: #fff;
        }

        .filter-divider-c {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            margin: 12px 0;
        }

        .price-filter-c {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .price-label-c {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .price-input-c {
            width: 70px;
            height: 32px;
            padding: 0 8px 0 20px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .price-input-c:focus {
            border-color: rgba(129, 140, 248, 0.5);
            background: rgba(129, 140, 248, 0.05);
        }
        .price-wrapper-c {
            position: relative;
        }
        .price-wrapper-c::before {
            content: '$';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 11px;
        }
        .price-sep-c {
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }

        .attr-filters-c {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .attr-btn-c {
            height: 32px;
            padding: 0 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .attr-btn-c:hover {
            background: rgba(129, 140, 248, 0.1);
            border-color: rgba(129, 140, 248, 0.3);
            color: #fff;
        }
        .attr-btn-c .arrow {
            font-size: 8px;
            opacity: 0.5;
            transition: transform 0.2s;
        }
        .attr-btn-c:hover .arrow {
            opacity: 1;
        }

        /* Dock 导航 */
        .prime-nav-dock {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 6px;
            display: flex;
            gap: 4px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            margin-bottom: 12px;
        }
        .prime-nav-item {
            flex: 1;
            height: 40px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: #9ca3af;
            transition: all 0.3s;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .prime-nav-item:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .prime-nav-item.active {
            background: linear-gradient(135deg, #2dd4bf 0%, #3b82f6 100%);
            color: #000;
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);
        }

        /* Hybrid 卡片 */
        .hybrid-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .hybrid-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        .hybrid-card::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--card-color);
            opacity: 0.9;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px var(--card-color), 0 0 15px var(--card-color-dim);
        }

        .hybrid-card:hover {
            background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            transform: translateY(-2px);
            box-shadow: 
                0 0 0 1px var(--card-color-alpha),
                0 10px 30px -10px rgba(0,0,0,0.5),
                0 0 20px var(--card-color-dim);
        }

        .hybrid-card:hover::after {
            opacity: 1;
            width: 6px;
            box-shadow: 0 0 12px var(--card-color), 0 0 25px var(--card-color);
        }

        .hybrid-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--card-color);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .hybrid-card:hover .hybrid-icon {
            background: var(--card-color);
            color: #000;
            box-shadow: 0 0 15px var(--card-color);
            transform: scale(1.1) rotate(-5deg);
        }

        .hybrid-title {
            font-size: 14px;
            font-weight: 700;
            color: #e5e5e5;
            margin-bottom: 2px;
        }
        .hybrid-card:hover .hybrid-title { color: #fff; }
        
        .hybrid-desc {
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }
        .hybrid-card:hover .hybrid-desc { color: var(--card-color); }

        .hybrid-arrow {
            margin-left: auto;
            color: #444;
            transition: all 0.3s;
            margin-right: 8px;
        }
        .hybrid-card:hover .hybrid-arrow {
            color: var(--card-color);
            transform: translateX(4px);
        }

        /* 工具按钮 */
        .hybrid-btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .hybrid-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            height: 32px;
            padding: 0 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: #aaa;
            transition: all 0.2s;
            flex-grow: 1;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .hybrid-btn:hover {
            background: var(--btn-bg);
            color: var(--btn-color);
            border-color: var(--btn-color);
            box-shadow: 0 0 10px var(--btn-dim);
            transform: translateY(-1px);
        }

        /* 区块标题 */
        .section-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 10px;
            margin-left: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-label .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="style-c p-5">
        <!-- 完整搜索组件 -->
        <div class="search-panel-c">
            <!-- 搜索输入行 -->
            <div class="search-row-c">
                <input type="text" placeholder="Enter product name..." class="search-input-c">
                <div class="btn-group">
                    <button class="search-btn-c primary">Search</button>
                    <button class="search-btn-c secondary">Reset</button>
                </div>
            </div>
            <!-- 分隔线 -->
            <div class="filter-divider-c"></div>
            <!-- 价格筛选 -->
            <div class="price-filter-c">
                <span class="price-label-c">Price</span>
                <div class="price-wrapper-c">
                    <input type="number" value="0" placeholder="Min" class="price-input-c">
                </div>
                <span class="price-sep-c">-</span>
                <div class="price-wrapper-c">
                    <input type="number" value="5000" placeholder="Max" class="price-input-c">
                </div>
            </div>
            <!-- 属性筛选按钮 -->
            <div class="attr-filters-c">
                <button class="attr-btn-c">Color <span class="arrow">▼</span></button>
                <button class="attr-btn-c">Diameter <span class="arrow">▼</span></button>
                <button class="attr-btn-c">Brake <span class="arrow">▼</span></button>
            </div>
        </div>

        <!-- Dock Nav -->
        <div class="prime-nav-dock">
            <div class="prime-nav-item active">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                <span>Home</span>
            </div>
            <div class="prime-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                <span>Shop</span>
            </div>
            <div class="prime-nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span>Picture</span>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="flex-1 overflow-y-auto no-scrollbar space-y-4 pr-1">
            <!-- Quick Access -->
            <div>
                <div class="section-label"><span class="dot bg-indigo-500"></span>Quick Access</div>
                <div class="space-y-3">
                    <!-- Payment -->
                    <div class="hybrid-card cursor-pointer" style="--card-color: #818cf8; --card-color-alpha: rgba(129, 140, 248, 0.5); --card-color-dim: rgba(129, 140, 248, 0.2); --card-bg: rgba(129, 140, 248, 0.1);">
                        <div class="hybrid-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg></div>
                        <div><div class="hybrid-title">Payment Methods</div><div class="hybrid-desc">Wallet, Cards & Crypto</div></div>
                        <svg class="hybrid-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>
                    <!-- Shipping -->
                    <div class="hybrid-card cursor-pointer" style="--card-color: #2dd4bf; --card-color-alpha: rgba(45, 212, 191, 0.5); --card-color-dim: rgba(45, 212, 191, 0.2); --card-bg: rgba(45, 212, 191, 0.1);">
                        <div class="hybrid-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg></div>
                        <div><div class="hybrid-title">Shipping Info</div><div class="hybrid-desc">Track & Trace</div></div>
                        <svg class="hybrid-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>
                    <!-- Warranty -->
                    <div class="hybrid-card cursor-pointer" style="--card-color: #38bdf8; --card-color-alpha: rgba(56, 189, 248, 0.5); --card-color-dim: rgba(56, 189, 248, 0.2); --card-bg: rgba(56, 189, 248, 0.1);">
                        <div class="hybrid-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></div>
                        <div><div class="hybrid-title">Warranty Policy</div><div class="hybrid-desc">Protection Plan</div></div>
                        <svg class="hybrid-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>
                    <!-- After Sales -->
                    <div class="hybrid-card cursor-pointer" style="--card-color: #f472b6; --card-color-alpha: rgba(244, 114, 182, 0.5); --card-color-dim: rgba(244, 114, 182, 0.2); --card-bg: rgba(244, 114, 182, 0.1);">
                        <div class="hybrid-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg></div>
                        <div><div class="hybrid-title">After Sales</div><div class="hybrid-desc">24/7 Support</div></div>
                        <svg class="hybrid-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </div>
                </div>
            </div>

            <!-- Tools & Resources -->
            <div>
                <div class="section-label"><span class="dot bg-teal-400"></span>Tools & Resources</div>
                <div class="hybrid-btn-group">
                    <!-- Support -->
                    <button class="hybrid-btn" style="--btn-color: #2dd4bf; --btn-bg: rgba(45,212,191,0.1); --btn-dim: rgba(45,212,191,0.2)">Warranty Check</button>
                    <button class="hybrid-btn" style="--btn-color: #2dd4bf; --btn-bg: rgba(45,212,191,0.1); --btn-dim: rgba(45,212,191,0.2)">Spoke Calculator</button>
                    <button class="hybrid-btn" style="--btn-color: #2dd4bf; --btn-bg: rgba(45,212,191,0.1); --btn-dim: rgba(45,212,191,0.2)">Test Report</button>
                    <button class="hybrid-btn" style="--btn-color: #2dd4bf; --btn-bg: rgba(45,212,191,0.1); --btn-dim: rgba(45,212,191,0.2)">All FAQs</button>
                    
                    <!-- Guides -->
                    <button class="hybrid-btn" style="--btn-color: #38bdf8; --btn-bg: rgba(56,189,248,0.1); --btn-dim: rgba(56,189,248,0.2)">Wheelset Guide</button>
                    <button class="hybrid-btn" style="--btn-color: #38bdf8; --btn-bg: rgba(56,189,248,0.1); --btn-dim: rgba(56,189,248,0.2)">Tire Size</button>
                    <button class="hybrid-btn" style="--btn-color: #38bdf8; --btn-bg: rgba(56,189,248,0.1); --btn-dim: rgba(56,189,248,0.2)">Technical</button>
                    <button class="hybrid-btn" style="--btn-color: #38bdf8; --btn-bg: rgba(56,189,248,0.1); --btn-dim: rgba(56,189,248,0.2)">Our Story</button>
                    <button class="hybrid-btn" style="--btn-color: #38bdf8; --btn-bg: rgba(56,189,248,0.1); --btn-dim: rgba(56,189,248,0.2)">Membership</button>

                    <!-- Brands -->
                    <button class="hybrid-btn" style="--btn-color: #818cf8; --btn-bg: rgba(129,140,248,0.1); --btn-dim: rgba(129,140,248,0.2)">SAPIM</button>
                    <button class="hybrid-btn" style="--btn-color: #818cf8; --btn-bg: rgba(129,140,248,0.1); --btn-dim: rgba(129,140,248,0.2)">DT SWISS</button>
                    <button class="hybrid-btn" style="--btn-color: #818cf8; --btn-bg: rgba(129,140,248,0.1); --btn-dim: rgba(129,140,248,0.2)">PILLAR</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
