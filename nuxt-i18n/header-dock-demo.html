<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Header & Dock Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #020617 0, #020617 24%, #000000 100%);
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
    </style>
  </head>
  <body class="flex flex-col">
    <!-- Site Header Demo -->
    <header class="pt-4 px-4">
      <!-- Outer shell capsule (matches SiteHeader outer container) -->
      <div
        class="mx-auto max-w-6xl rounded-[30px] bg-[radial-gradient(circle_at_top_left,rgba(15,23,42,0.96),rgba(15,23,42,1))] px-3 py-2 shadow-[0_10px_26px_-14px_rgba(0,0,0,0.95)] backdrop-blur-2xl"
      >
        <!-- Desktop: two-layer capsule + breadcrumbs -->
        <div class="hidden md:flex flex-col items-center gap-1">
          <!-- Inner main capsule -->
          <div
            class="w-full grid grid-cols-[160px_1fr_auto] lg:grid-cols-[200px_1fr_200px] items-center gap-2 lg:gap-4 px-3 lg:px-6 py-3 rounded-[999px] bg-[radial-gradient(circle_at_top_left,rgba(31,41,55,0.98),rgba(15,23,42,0.98))] shadow-[0_18px_45px_-18px_rgba(0,0,0,1)]"
          >
            <!-- Left: Logo -->
            <div class="flex items-center justify-start">
              <h1 class="m-0 text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#40ffaa] to-[#6b73ff] tracking-wide drop-shadow-[0_2px_8px_rgba(64,255,170,0.3)] leading-none italic">
                TANZANITE
              </h1>
            </div>

            <!-- Center: Main nav -->
            <nav class="flex items-center justify-center gap-4 lg:gap-8 relative text-[14px]">
              <div class="w-px h-6 bg-white/10 absolute left-0 hidden xl:block"></div>

              <button
                class="relative font-medium text-sky-100"
              >
                Products
                <span
                  class="pointer-events-none absolute bottom-[-4px] left-0 right-0 h-[2px] rounded-full bg-gradient-to-r from-[#40ffaa] to-[#6b73ff]"
                ></span>
              </button>
              <button class="font-medium text-white/60 hover:text-white transition-colors">
                Support
              </button>
              <button class="font-medium text-white/60 hover:text-white transition-colors">
                Company
              </button>
              <button class="font-medium text-white/60 hover:text-white transition-colors">
                Guides
              </button>

              <div class="w-px h-6 bg-white/10 absolute right-0 hidden xl:block"></div>
            </nav>

            <!-- Right: Actions -->
            <div class="flex items-center justify-end gap-3">
              <!-- Search (matches real SiteHeader SVG) -->
              <button
                class="w-9 h-9 rounded-full bg-slate-900/70 flex items-center justify-center text-slate-200 shadow-[0_4px_14px_rgba(0,0,0,0.9)] hover:text-sky-300 hover:shadow-[0_8px_24px_-6px_rgba(0,0,0,1)] transition-all"
                aria-label="Search"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </svg>
              </button>

              <!-- Language -->
              <button
                class="w-9 h-9 rounded-full bg-slate-900/70 flex items-center justify-center text-[11px] font-semibold text-slate-200 shadow-[0_4px_14px_rgba(0,0,0,0.9)] hover:text-sky-300 hover:shadow-[0_8px_24px_-6px_rgba(0,0,0,1)] transition-all"
              >
                EN
              </button>

              <!-- Primary CTA (matches real SiteHeader SVG) -->
              <button
                class="w-10 h-10 rounded-full bg-[linear-gradient(135deg,#22c55e,#3b82f6)] flex items-center justify-center text-slate-950 shadow-[0_10px_26px_-6px_rgba(0,0,0,1)] hover:shadow-[0_14px_32px_-8px_rgba(0,0,0,1)] transition-all"
                aria-label="Open membership panel"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 3h12l4 6-10 13L2 9Z" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Breadcrumbs row -->
          <nav aria-label="Breadcrumb" class="flex justify-center mt-1">
            <ol class="flex items-center gap-1.5 text-[11px] text-slate-500 leading-tight">
              <li class="flex items-center gap-1">
                <span class="hover:text-slate-200 cursor-pointer">Home</span>
                <span class="text-slate-700">/</span>
              </li>
              <li class="flex items-center gap-1">
                <span class="hover:text-slate-200 cursor-pointer">Products</span>
                <span class="text-slate-700">/</span>
              </li>
              <li>
                <span class="text-slate-300 font-medium">Spoke Calculator</span>
              </li>
            </ol>
          </nav>
        </div>

        <!-- Simple mobile row (just to avoid empty header on small screens) -->
        <div class="flex items-center justify-between gap-3 md:hidden px-1 py-1.5">
          <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#40ffaa] to-[#6b73ff] tracking-wide">
            TANZANITE
          </h1>
          <div class="flex items-center gap-2">
            <button
              class="w-8 h-8 rounded-full bg-slate-900/70 flex items-center justify-center text-slate-200 shadow-[0_3px_10px_rgba(0,0,0,0.9)]"
              aria-label="Search"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </svg>
            </button>
            <button
              class="w-8 h-8 rounded-full bg-[linear-gradient(135deg,#22c55e,#3b82f6)] flex items-center justify-center text-slate-950 shadow-[0_8px_20px_-6px_rgba(0,0,0,1)]"
              aria-label="Open membership panel"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 3h12l4 6-10 13L2 9Z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Content spacer -->
    <main class="flex-1 px-4 pt-8 pb-28">
      <div class="mx-auto max-w-4xl space-y-4">
        <h1 class="text-xl font-semibold text-slate-50">Header & Dock Style Demo</h1>
        <p class="text-sm text-slate-400">
          Use this page purely to validate the visual style of the site header and bottom dock menu.
          Once we are happy, we will map these classes into the real Vue components.
        </p>
      </div>
    </main>

    <!-- Bottom Dock Menu Demo -->
    <div class="pointer-events-none fixed inset-x-0 bottom-6 z-40 flex justify-center">
      <nav
        class="pointer-events-auto flex items-center justify-between gap-3 rounded-full bg-[radial-gradient(circle_at_top,rgba(31,41,55,0.98),rgba(15,23,42,0.98),rgba(15,23,42,1))] px-4 py-3 shadow-[0_24px_56px_-16px_rgba(0,0,0,1)] backdrop-blur-2xl w-[96%] max-w-[500px]"
      >
        <!-- Menu -->
        <button class="flex-1 flex flex-col items-center gap-0.5 text-[11px] font-medium text-slate-300">
          <span class="flex items-center justify-center w-5 h-5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </span>
          <span>Menu</span>
        </button>

        <!-- Chat -->
        <button class="flex-1 flex flex-col items-center gap-0.5 text-[11px] font-medium text-slate-300 relative">
          <span class="flex items-center justify-center w-5 h-5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
              />
            </svg>
          </span>
          <span>Chat</span>
          <!-- Static unread badge demo -->
          <span class="absolute top-0 right-2 w-2 h-2 rounded-full bg-red-500 border border-slate-900"></span>
        </button>

        <!-- Center checkout price -->
        <button class="h-9 px-4 mx-1 rounded-full bg-[linear-gradient(135deg,#40ffaa,#6b73ff)] text-slate-950 text-[11px] font-semibold flex items-center justify-center shadow-[0_12px_32px_rgba(0,0,0,0.9)] min-w-[72px]">
          <span>$11.00</span>
        </button>

        <!-- Quick -->
        <button class="flex-1 flex flex-col items-center gap-0.5 text-[11px] font-medium text-slate-300">
          <span class="flex items-center justify-center w-5 h-5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </span>
          <span>Quick</span>
        </button>

        <!-- Cart -->
        <button class="flex-1 flex flex-col items-center gap-0.5 text-[11px] font-medium text-slate-300">
          <span class="flex items-center justify-center w-5 h-5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="9" cy="21" r="1" />
              <circle cx="20" cy="21" r="1" />
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
          </span>
          <span>Cart</span>
        </button>

        <!-- Saved -->
        <button class="flex-1 flex flex-col items-center gap-0.5 text-[11px] font-medium text-slate-300 relative">
          <span class="flex items-center justify-center w-5 h-5">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
              />
            </svg>
          </span>
          <span>Saved</span>
          <span class="absolute top-0 right-2 w-2 h-2 rounded-full bg-emerald-400 border border-slate-900"></span>
        </button>
      </nav>
    </div>
  </body>
</html>
