<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dock Menu Design Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #02040a;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a2342 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, #1e1b4b 0%, transparent 30%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding-top: 50px;
            padding-bottom: 100px;
        }

        .glass-panel {
            background: rgba(11, 16, 32, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .mobile-frame {
            width: 390px;
            height: 200px; /* Just showing the bottom part */
            border: 1px solid #333;
            border-radius: 0 0 40px 40px;
            border-top: none;
            position: relative;
            background: linear-gradient(to bottom, transparent, #02040a 80%);
            overflow: hidden;
        }

        .preview-label {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Option 1: Unified Capsule (统一胶囊) -->
    <div>
        <div class="preview-label">Option 1A: Icons Only (Cleanest)</div>
        <div class="mobile-frame">
            <!-- Content placeholder -->
            <div class="absolute inset-0 flex items-end justify-center pb-20 px-6">
                <div class="w-full h-20 bg-white/5 rounded-xl"></div>
            </div>

            <!-- The Dock -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-[360px]">
                <div class="glass-panel rounded-full px-1 py-2 flex items-center justify-between">
                    
                    <!-- Sidebar Toggle -->
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-white/70 hover:text-white hover:bg-white/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>

                    <!-- Chat -->
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-white/70 hover:text-white hover:bg-white/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    </button>

                    <!-- Checkout (Main Action) -->
                    <button class="mx-1 h-10 px-3 rounded-full bg-gradient-to-r from-[#40ffaa] to-[#6b73ff] text-[#0b1020] font-bold text-xs flex items-center gap-1 shadow-lg shadow-[#40ffaa]/20 hover:shadow-[#40ffaa]/40 transition-all transform hover:-translate-y-0.5">
                        <span>$1,299</span>
                    </button>

                    <!-- Quick Buy (Lightning) -->
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-white/70 hover:text-[#40ffaa] hover:bg-white/10 transition-all" title="Quick Buy">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                    </button>

                    <!-- Cart -->
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-white/70 hover:text-white hover:bg-white/10 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    </button>

                    <!-- Wishlist -->
                    <button class="w-10 h-10 rounded-full flex items-center justify-center text-white/70 hover:text-white hover:bg-white/10 transition-all relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-[#40ffaa] rounded-full"></span>
                    </button>

                </div>
            </div>
        </div>
    </div>

    <!-- Option 1B: Capsule WITH TEXT -->
    <div>
        <div class="preview-label">Option 1B: Capsule with Text (Labels)</div>
        <div class="mobile-frame">
            <div class="absolute inset-0 flex items-end justify-center pb-24 px-6">
                <div class="w-full h-20 bg-white/5 rounded-xl"></div>
            </div>

            <!-- The Dock (Taller to fit text) -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-[98%] max-w-[380px]">
                <div class="glass-panel rounded-[24px] px-1 py-2 flex items-center justify-between">
                    
                    <!-- Sidebar -->
                    <button class="flex-1 flex flex-col items-center gap-0.5 text-white/60 hover:text-white transition-colors py-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                        <span class="text-[9px] font-medium tracking-tight">Menu</span>
                    </button>

                    <!-- Chat -->
                    <button class="flex-1 flex flex-col items-center gap-0.5 text-white/60 hover:text-white transition-colors py-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        <span class="text-[9px] font-medium tracking-tight">Chat</span>
                    </button>

                    <!-- Checkout (Main) -->
                    <button class="h-10 px-3 mx-1 rounded-full bg-gradient-to-r from-[#40ffaa] to-[#6b73ff] text-[#0b1020] font-bold text-xs flex items-center justify-center shadow-lg shadow-[#40ffaa]/20">
                        <span>$1,299</span>
                    </button>

                    <!-- Quick -->
                    <button class="flex-1 flex flex-col items-center gap-0.5 text-white/60 hover:text-[#40ffaa] transition-colors py-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        <span class="text-[9px] font-medium tracking-tight">Quick</span>
                    </button>

                    <!-- Cart -->
                    <button class="flex-1 flex flex-col items-center gap-0.5 text-white/60 hover:text-white transition-colors py-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        <span class="text-[9px] font-medium tracking-tight">Cart</span>
                    </button>

                    <!-- Saved -->
                    <button class="flex-1 flex flex-col items-center gap-0.5 text-white/60 hover:text-white transition-colors py-1 relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <span class="text-[9px] font-medium tracking-tight">Saved</span>
                        <span class="absolute top-1 right-2 w-1.5 h-1.5 bg-[#40ffaa] rounded-full"></span>
                    </button>

                </div>
            </div>
        </div>
    </div>


    <!-- Option 2: Floating Bar (悬浮通栏) -->
    <div>
        <div class="preview-label">Option 2: Floating Bar (More Traditional)</div>
        <div class="mobile-frame" style="border-radius: 0; height: 150px;">
            
            <!-- The Dock -->
            <div class="absolute bottom-0 left-0 right-0 glass-panel border-t border-white/10 pb-6 pt-3 px-4 flex justify-between items-center">
                
                <button class="flex flex-col items-center gap-1 text-white/60 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    <span class="text-[10px]">Menu</span>
                </button>

                <button class="flex flex-col items-center gap-1 text-white/60 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                    <span class="text-[10px]">Chat</span>
                </button>

                <button class="h-10 px-5 rounded-full bg-[#40ffaa] text-[#0b1020] font-bold text-sm flex items-center gap-2 shadow-lg shadow-[#40ffaa]/20 -mt-6 border-4 border-[#02040a]">
                    <span>$1,299</span>
                </button>

                <button class="flex flex-col items-center gap-1 text-white/60 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <span class="text-[10px]">Cart</span>
                </button>

                <button class="flex flex-col items-center gap-1 text-white/60 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span class="text-[10px]">Saved</span>
                </button>

            </div>
        </div>
    </div>

</body>
</html>
