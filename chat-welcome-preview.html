<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Welcome Screen Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-modal {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #0d1117 0%, #000 100%);
      border: 2px solid #6b73ff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(107, 115, 255, 0.3);
    }

    /* 欢迎页 */
    .welcome-screen {
      padding: 32px 24px;
    }

    /* 头部 Logo + 关闭 */
    .welcome-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #6b73ff 0%, #40ffaa 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: #000;
    }

    .close-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* 欢迎语 */
    .welcome-greeting {
      margin-bottom: 32px;
    }

    .welcome-greeting h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .welcome-greeting h1 span {
      display: inline-block;
      animation: wave 1.5s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(20deg); }
      75% { transform: rotate(-10deg); }
    }

    .welcome-greeting p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
    }

    /* 客服状态卡片 */
    .agents-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .agents-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: #6b7280;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .status-text strong {
      color: #10b981;
    }

    /* 客服头像列表 */
    .agents-list {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .agent-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 12px;
      border-radius: 12px;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex: 1;
      min-width: 80px;
    }

    .agent-item:hover {
      background: rgba(107, 115, 255, 0.1);
      border-color: rgba(107, 115, 255, 0.3);
    }

    .agent-item.selected {
      background: rgba(107, 115, 255, 0.15);
      border-color: #6b73ff;
    }

    .agent-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6b73ff 0%, #40ffaa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      color: #000;
      position: relative;
    }

    .agent-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .agent-online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      border: 2px solid #0d1117;
    }

    .agent-online-dot.offline {
      background: #6b7280;
    }

    .agent-name {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      max-width: 70px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 开始对话按钮 */
    .start-chat-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6b73ff 0%, #40ffaa 100%);
      color: #000;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .start-chat-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(107, 115, 255, 0.4);
    }

    .start-chat-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* FAQ 区域 */
    .faq-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .faq-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .faq-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .faq-item:hover {
      background: rgba(107, 115, 255, 0.1);
      border-color: rgba(107, 115, 255, 0.3);
    }

    .faq-item span {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
    }

    .faq-item svg {
      width: 16px;
      height: 16px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* 联系方式 */
    .contact-options {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .contact-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .contact-btn.whatsapp {
      background: #25D366;
      color: #fff;
    }

    .contact-btn.email {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .contact-btn:hover {
      transform: translateY(-1px);
    }

    /* 响应式 */
    @media (max-width: 400px) {
      .welcome-screen {
        padding: 24px 16px;
      }

      .welcome-greeting h1 {
        font-size: 24px;
      }

      .agent-item {
        min-width: 70px;
        padding: 10px;
      }

      .agent-avatar {
        width: 40px;
        height: 40px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-modal">
    <div class="welcome-screen">
      <!-- 头部 -->
      <div class="welcome-header">
        <div class="brand-logo">T</div>
        <button class="close-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- 欢迎语 -->
      <div class="welcome-greeting">
        <h1>Hi there! <span>👋</span></h1>
        <p>Welcome to Tanzanite. We're here to help you find the perfect carbon wheels for your ride.</p>
      </div>

      <!-- 客服状态卡片 -->
      <div class="agents-card">
        <div class="agents-status">
          <div class="status-dot"></div>
          <span class="status-text"><strong>2 agents</strong> online now</span>
        </div>

        <div class="agents-list">
          <div class="agent-item selected">
            <div class="agent-avatar">
              SA
              <div class="agent-online-dot"></div>
            </div>
            <span class="agent-name">Sales</span>
          </div>
          <div class="agent-item">
            <div class="agent-avatar">
              TS
              <div class="agent-online-dot"></div>
            </div>
            <span class="agent-name">Tech Support</span>
          </div>
          <div class="agent-item">
            <div class="agent-avatar">
              AS
              <div class="agent-online-dot offline"></div>
            </div>
            <span class="agent-name">After Sales</span>
          </div>
        </div>
      </div>

      <!-- 开始对话按钮 -->
      <button class="start-chat-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Start Conversation
      </button>

      <!-- 快捷联系 -->
      <div class="contact-options">
        <button class="contact-btn whatsapp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
          </svg>
          WhatsApp
        </button>
        <button class="contact-btn email">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          Email
        </button>
      </div>

      <!-- FAQ -->
      <div class="faq-section">
        <div class="faq-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          Popular Questions
        </div>
        <div class="faq-list">
          <a href="#" class="faq-item">
            <span>How to choose the right wheelset?</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>
          <a href="#" class="faq-item">
            <span>What's the warranty policy?</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>
          <a href="#" class="faq-item">
            <span>Shipping & delivery times</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 模拟选择客服
    document.querySelectorAll('.agent-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.agent-item').forEach(i => i.classList.remove('selected'));
        this.classList.add('selected');
      });
    });

    // 开始对话
    document.querySelector('.start-chat-btn').addEventListener('click', function() {
      alert('进入聊天界面...');
    });
  </script>
</body>
</html>
