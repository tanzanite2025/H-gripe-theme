name: tanzanite-theme

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

x-api-environment: &api-environment
  CONFIG_FILE: /app/config/config.production.yaml
  SERVER_MODE: release
  SERVER_PORT: :9000
  SERVER_BASE_URL: ${SERVER_BASE_URL:?SERVER_BASE_URL is required}
  DB_HOST: db
  DB_PORT: "5432"
  DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_NAME: ${DB_NAME:?DB_NAME is required}
  DB_AUTO_MIGRATE: "false"
  DB_LOG_LEVEL: silent
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  TRUSTED_PROXIES: ${TRUSTED_PROXIES:?TRUSTED_PROXIES is required}
  COOKIE_SECURE: always
  COOKIE_SAME_SITE: lax
  COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
  WORKER_ENABLED: "false"
  LOG_LEVEL: info
  LOG_FORMAT: json
  STORAGE_TYPE: local
  STORAGE_LOCAL_PATH: /app/uploads
  STORAGE_BASE_URL: ${SERVER_BASE_URL:?SERVER_BASE_URL is required}

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    shm_size: 256m
    mem_limit: 1536m
    cpus: 1.00
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - sh
      - -c
      - exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.50
    logging: *default-logging

  migrate:
    image: ghcr.io/tanzanite2025/tanzanite-theme-api:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: always
    restart: "no"
    command: ["migrate"]
    environment: *api-environment
    depends_on:
      db:
        condition: service_healthy
    networks:
      - data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 768m
    cpus: 0.75
    logging: *default-logging

  api:
    image: ghcr.io/tanzanite2025/tanzanite-theme-api:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "9000"
    environment: *api-environment
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - data
      - app
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 1536m
    cpus: 1.50
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  storefront:
    image: ghcr.io/tanzanite2025/tanzanite-theme-storefront:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      NUXT_PUBLIC_API_BASE: /api/v1
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.75
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  admin:
    image: ghcr.io/tanzanite2025/tanzanite-theme-admin:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  web:
    image: ghcr.io/tanzanite2025/tanzanite-theme-web:${IMAGE_TAG:?IMAGE_TAG is required}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      api:
        condition: service_healthy
      storefront:
        condition: service_healthy
      admin:
        condition: service_healthy
    volumes:
      - uploads:/srv/uploads:ro
    networks:
      app: {}
      edge:
        aliases:
          - theme-web
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

networks:
  data:
    internal: true
  app: {}
  edge:
    external: true
    name: tanzanite-edge

volumes:
  postgres_data:
    name: tanzanite-theme-postgres-data
  redis_data:
    name: tanzanite-theme-redis-data
  uploads:
    name: tanzanite-theme-uploads
