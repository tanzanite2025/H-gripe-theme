server:
  port: ":9000"
  mode: release
  base_url: "https://tanzanite.site"
  read_timeout: 120
  write_timeout: 120
  trusted_proxies: []

database:
  driver: postgres
  host: ${DB_HOST}
  port: ${DB_PORT}
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  database: ${DB_NAME}
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600
  auto_migrate: false
  log_level: silent

redis:
  host: ${REDIS_HOST}
  port: ${REDIS_PORT}
  password: ${REDIS_PASSWORD}
  db: 0
  pool_size: 20

jwt:
  secret: ${JWT_SECRET}
  expire_hours: 24
  refresh_expire_hours: 168

oauth:
  google_client_id: ${GOOGLE_CLIENT_ID}

i18n:
  default_locale: en
  supported_locales:
    - en
    - zh
    - fr
    - de
    - es
    - ja
    - ko
    - it
    - pt
    - ru
    - ar
    - fi
    - da
    - th

cors:
  allowed_origins:
    - "https://tanzanite.site"
    - "https://www.tanzanite.site"
    - "https://admin.tanzanite.site"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Origin
    - Content-Type
    - Accept-Language
    - X-CSRF-Token
    - X-Request-ID
  expose_headers:
    - Content-Length
    - X-Request-ID
  allow_credentials: true
  max_age: 43200

cookie:
  secure: always
  same_site: lax
  domain: ""

cache:
  default_ttl: 3600
  post_ttl: 3600
  product_ttl: 1800
  settings_ttl: 7200

worker:
  enabled: false

log:
  level: info
  format: json
  output: stdout
