apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      # Slack配置（需要替换为实际的Webhook URL）
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

    # 告警路由配置
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      
      routes:
      # 严重告警立即发送到多个渠道
      - match:
          severity: critical
        receiver: 'critical-alerts'
        continue: true
        
      # 警告告警发送到Slack
      - match:
          severity: warning
        receiver: 'warning-alerts'
        
      # 数据库相关告警
      - match_re:
          alertname: '(DatabaseConnectionPoolExhausted|PostgreSQLDown)'
        receiver: 'database-alerts'
        
      # API相关告警
      - match_re:
          alertname: '(APIDown|HighErrorRate|HighResponseTime)'
        receiver: 'api-alerts'

    # 告警抑制规则
    inhibit_rules:
    # 如果整个服务down了，不需要发送高错误率告警
    - source_match:
        severity: 'critical'
        alertname: 'APIDown'
      target_match:
        severity: 'warning'
      equal: ['pod', 'namespace']
      
    # 如果节点down了，不需要发送Pod告警
    - source_match:
        alertname: 'NodeDown'
      target_match_re:
        alertname: '(PodDown|PodRestartingTooOften)'
      equal: ['node']

    # 告警接收器
    receivers:
    # 默认接收器
    - name: 'default'
      slack_configs:
      - channel: '#alerts'
        title: 'Tanzanite Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

    # 严重告警 - 多渠道通知
    - name: 'critical-alerts'
      slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Pod:* {{ .Labels.pod }}
          *Namespace:* {{ .Labels.namespace }}
          {{ end }}
        send_resolved: true
        
      email_configs:
      - to: 'ops-team@tanzanite.com'
        from: 'alertmanager@tanzanite.com'
        smarthost: 'smtp.gmail.com:587'
        auth_username: 'alertmanager@tanzanite.com'
        auth_password: '{{ .ExternalSecret.smtp_password }}'
        headers:
          Subject: '🚨 CRITICAL Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Alert Triggered</h2>
          {{ range .Alerts }}
          <p><strong>Alert:</strong> {{ .Labels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .Labels.severity }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Pod:</strong> {{ .Labels.pod }}</p>
          <p><strong>Namespace:</strong> {{ .Labels.namespace }}</p>
          <hr>
          {{ end }}
        send_resolved: true

      # PagerDuty集成（需要配置service_key）
      # pagerduty_configs:
      # - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
      #   description: '{{ .GroupLabels.alertname }}: {{ .Annotations.summary }}'

    # 警告告警
    - name: 'warning-alerts'
      slack_configs:
      - channel: '#alerts'
        title: '⚠️ Warning: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

    # 数据库告警
    - name: 'database-alerts'
      slack_configs:
      - channel: '#database-alerts'
        title: '🗄️ Database Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

    # API告警
    - name: 'api-alerts'
      slack_configs:
      - channel: '#api-alerts'
        title: '🔧 API Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.26.0
        args:
          - '--config.file=/etc/alertmanager/alertmanager.yml'
          - '--storage.path=/alertmanager'
          - '--cluster.advertise-address=0.0.0.0:9093'
        ports:
        - containerPort: 9093
          name: http
        volumeMounts:
        - name: alertmanager-config
          mountPath: /etc/alertmanager
        - name: alertmanager-storage
          mountPath: /alertmanager
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: alertmanager-config
        configMap:
          name: alertmanager-config
      - name: alertmanager-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 9093
    targetPort: 9093
    protocol: TCP
    name: http
  selector:
    app: alertmanager

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: alertmanager-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - alertmanager.tanzanite.example.com
    secretName: alertmanager-tls
  rules:
  - host: alertmanager.tanzanite.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: alertmanager
            port:
              number: 9093

---
# 创建Basic Auth密码
# htpasswd -c auth admin
# kubectl create secret generic alertmanager-basic-auth --from-file=auth -n monitoring
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-basic-auth
  namespace: monitoring
type: Opaque
stringData:
  auth: |
    admin:$apr1$xyz.../...  # 使用htpasswd生成
