apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
      - name: postgres-exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        ports:
        - containerPort: 9187
          name: metrics
        env:
        - name: DATA_SOURCE_NAME
          valueFrom:
            secretKeyRef:
              name: postgres-exporter-secret
              key: data-source-name
        - name: PG_EXPORTER_EXTEND_QUERY_PATH
          value: "/etc/postgres-exporter/queries.yaml"
        volumeMounts:
        - name: queries
          mountPath: /etc/postgres-exporter
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9187
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: queries
        configMap:
          name: postgres-exporter-queries

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app: postgres-exporter
spec:
  type: ClusterIP
  ports:
  - port: 9187
    targetPort: 9187
    protocol: TCP
    name: metrics
  selector:
    app: postgres-exporter

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: monitoring
type: Opaque
stringData:
  # 格式: postgresql://username:password@hostname:port/database?sslmode=disable
  data-source-name: "postgresql://tanzanite:password@postgres.production:5432/tanzanite?sslmode=disable"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: monitoring
data:
  queries.yaml: |
    # 数据库大小
    pg_database_size:
      query: "SELECT pg_database.datname, pg_database_size(pg_database.datname) as size_bytes FROM pg_database"
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - size_bytes:
            usage: "GAUGE"
            description: "Database size in bytes"

    # 表大小
    pg_table_size:
      query: |
        SELECT
          schemaname,
          tablename,
          pg_total_relation_size(schemaname||'.'||tablename) AS size_bytes
        FROM pg_tables
        WHERE schemaname NOT IN ('pg_catalog', 'information_schema')
      master: true
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - tablename:
            usage: "LABEL"
            description: "Table name"
        - size_bytes:
            usage: "GAUGE"
            description: "Table size in bytes"

    # 活动连接数
    pg_stat_activity_count:
      query: |
        SELECT
          datname,
          state,
          COUNT(*) as connections
        FROM pg_stat_activity
        WHERE datname IS NOT NULL
        GROUP BY datname, state
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - state:
            usage: "LABEL"
            description: "Connection state"
        - connections:
            usage: "GAUGE"
            description: "Number of connections"

    # 慢查询
    pg_slow_queries:
      query: |
        SELECT
          datname,
          COUNT(*) as slow_queries
        FROM pg_stat_activity
        WHERE state = 'active'
          AND now() - query_start > interval '5 seconds'
        GROUP BY datname
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - slow_queries:
            usage: "GAUGE"
            description: "Number of slow queries"

    # 表统计信息
    pg_stat_user_tables:
      query: |
        SELECT
          schemaname,
          relname,
          seq_scan,
          seq_tup_read,
          idx_scan,
          idx_tup_fetch,
          n_tup_ins,
          n_tup_upd,
          n_tup_del
        FROM pg_stat_user_tables
      master: true
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Schema name"
        - relname:
            usage: "LABEL"
            description: "Table name"
        - seq_scan:
            usage: "COUNTER"
            description: "Number of sequential scans"
        - seq_tup_read:
            usage: "COUNTER"
            description: "Number of tuples read by sequential scans"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Number of tuples fetched by index scans"
        - n_tup_ins:
            usage: "COUNTER"
            description: "Number of tuples inserted"
        - n_tup_upd:
            usage: "COUNTER"
            description: "Number of tuples updated"
        - n_tup_del:
            usage: "COUNTER"
            description: "Number of tuples deleted"

    # 死锁统计
    pg_stat_database_conflicts:
      query: |
        SELECT
          datname,
          confl_tablespace,
          confl_lock,
          confl_snapshot,
          confl_bufferpin,
          confl_deadlock
        FROM pg_stat_database_conflicts
      master: true
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database name"
        - confl_tablespace:
            usage: "COUNTER"
            description: "Conflicts due to tablespace"
        - confl_lock:
            usage: "COUNTER"
            description: "Conflicts due to locks"
        - confl_snapshot:
            usage: "COUNTER"
            description: "Conflicts due to snapshots"
        - confl_bufferpin:
            usage: "COUNTER"
            description: "Conflicts due to buffer pins"
        - confl_deadlock:
            usage: "COUNTER"
            description: "Deadlocks detected"
