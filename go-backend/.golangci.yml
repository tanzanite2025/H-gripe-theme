version: "2"
run:
  concurrency: 4
  go: "1.25"
  tests: true
linters:
  enable:
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - nakedret
    - noctx
    - revive
    - unconvert
    - unparam
  disable:
    - exhaustive
    - exhaustruct
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - godox
    - lll
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt.Print
        - fmt.Println
        - fmt.Printf
    gocritic:
      disabled-checks:
        - ifElseChain
        - elseif
    gosec:
      excludes:
        - G104
      severity: medium
      confidence: medium
    misspell:
      locale: US
      ignore-rules:
        - tanzanite
        - cancelled
    nakedret:
      max-func-lines: 30
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    unparam:
      check-exported: false
    whitespace:
      multi-if: true
      multi-func: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - all
        path: \.pb\.go$
      - linters:
          - gochecknoglobals
        path: cmd/server/main\.go
      - linters:
          - gosec
        text: weak cryptographic primitive
      - linters:
          - gosec
        text: Use of weak random number generator
      - linters:
          - gosec
        path: ^(cmd[\\/]import|scripts)[\\/]
        text: "G(304|703):"
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
severity:
  default: warning
  rules:
    - linters:
        - errcheck
        - gosec
      severity: error
    - linters:
        - gocritic
        - revive
      severity: warning
    - linters:
        - misspell
        - whitespace
      severity: info
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/tanzanite
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
