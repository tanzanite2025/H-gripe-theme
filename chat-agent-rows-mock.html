<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Agent Rows Mock</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="min-h-screen bg-slate-950 text-white flex items-center justify-center p-6">
    <main class="w-full max-w-md">
      <div class="rounded-3xl border border-white/10 bg-[radial-gradient(circle_at_top,rgba(30,41,59,0.85),rgba(2,6,23,0.96))] p-5 shadow-[0_12px_40px_-20px_rgba(0,0,0,0.9)]">
        <div class="mb-4">
          <h1 class="text-2xl font-semibold tracking-tight">Hi there!</h1>
          <p class="mt-1 text-white/65">Chat with our team, track your orders, or find answers in our FAQ.</p>
        </div>

        <div class="mb-3 flex items-center gap-2 text-emerald-300/90">
          <span class="inline-block w-2 h-2 rounded-full bg-emerald-400"></span>
          <span class="text-sm font-semibold tracking-wide">ONLINE SUPPORT TEAM</span>
        </div>

        <!-- Three-row selectable list -->
        <div id="agentList" class="relative h-[204px]">
          <!-- Item: Sales -->
          <button
            type="button"
            class="agent-row group absolute left-1/2 text-left rounded-full shadow-[0_10px_18px_-14px_rgba(0,0,0,1)] transition-[transform,width,background-color,border-radius,filter] duration-300 ease-out will-change-transform"
            data-id="sales"
          >
            <div class="row-inner h-full flex items-center gap-3 px-3">
              <span class="avatar relative shrink-0 w-11 h-11 rounded-full bg-white/[0.16] flex items-center justify-center text-white/85 font-semibold">
                S
                <span class="absolute -right-0.5 -bottom-0.5 w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_0_2px_rgba(52,211,153,0.25),0_0_10px_rgba(52,211,153,0.7)]"></span>
              </span>

              <span class="min-w-0 flex-1">
                <span class="flex items-center gap-2">
                  <span class="label text-sm font-semibold text-white/95">Sales</span>
                  <span class="badge text-[11px] text-emerald-300/95">Online</span>
                </span>
                <span class="desc mt-0.5 block text-xs text-white/70 truncate">Pre-sales questions, pricing, and quotes</span>
              </span>

              <span class="chev shrink-0 text-white/55">→</span>
            </div>
          </button>

          <!-- Item: Tech Support (default selected) -->
          <button
            type="button"
            class="agent-row group absolute left-1/2 text-left rounded-full shadow-[0_10px_18px_-14px_rgba(0,0,0,1)] transition-[transform,width,background-color,border-radius,filter] duration-300 ease-out will-change-transform"
            data-id="tech"
          >
            <div class="row-inner h-full flex items-center gap-3 px-3">
              <span class="avatar relative shrink-0 w-11 h-11 rounded-full bg-white/[0.16] flex items-center justify-center text-white/85 font-semibold">
                TS
                <span class="absolute -right-0.5 -bottom-0.5 w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_0_2px_rgba(52,211,153,0.25),0_0_10px_rgba(52,211,153,0.7)]"></span>
              </span>

              <span class="min-w-0 flex-1">
                <span class="flex items-center gap-2">
                  <span class="label text-sm font-semibold text-white/95">Tech Support</span>
                  <span class="badge text-[11px] text-emerald-300/95">Online</span>
                </span>
                <span class="desc mt-0.5 block text-xs text-white/70 truncate">Compatibility, specs, setup, and troubleshooting</span>
              </span>

              <span class="chev shrink-0 text-white/55">→</span>
            </div>
          </button>

          <!-- Item: After Sales -->
          <button
            type="button"
            class="agent-row group absolute left-1/2 text-left rounded-full shadow-[0_10px_18px_-14px_rgba(0,0,0,1)] transition-[transform,width,background-color,border-radius,filter] duration-300 ease-out will-change-transform"
            data-id="after"
          >
            <div class="row-inner h-full flex items-center gap-3 px-3">
              <span class="avatar relative shrink-0 w-11 h-11 rounded-full bg-white/[0.16] flex items-center justify-center text-white/85 font-semibold">
                AS
                <span class="absolute -right-0.5 -bottom-0.5 w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_0_2px_rgba(52,211,153,0.25),0_0_10px_rgba(52,211,153,0.7)]"></span>
              </span>

              <span class="min-w-0 flex-1">
                <span class="flex items-center gap-2">
                  <span class="label text-sm font-semibold text-white/95">After Sales</span>
                  <span class="badge text-[11px] text-emerald-300/95">Online</span>
                </span>
                <span class="desc mt-0.5 block text-xs text-white/70 truncate">Order tracking, warranty, returns, and post-purchase help</span>
              </span>

              <span class="chev shrink-0 text-white/55">→</span>
            </div>
          </button>
        </div>

        <p class="mt-3 text-xs text-white/50">Tip: Selected item grows; others shrink for stronger visual emphasis.</p>
      </div>

      <!-- Minimal behavior: selected grows, others shrink -->
      <script>
        const list = document.getElementById('agentList')
        const rows = Array.from(list.querySelectorAll('.agent-row'))
        const baseOrder = ['sales', 'tech', 'after']

        const GAP = 12
        const H_SELECTED = 68
        const H_UNSELECTED = 56
        const slotTops = [0, H_UNSELECTED + GAP, H_UNSELECTED + GAP + H_SELECTED + GAP]

        function applyPositions(selectedId) {
          const others = baseOrder.filter(id => id !== selectedId)
          const order = [others[0], selectedId, others[1]]

          rows.forEach(row => {
            const id = row.dataset.id
            const slotIndex = order.indexOf(id)
            row.style.transform = `translate(-50%, ${slotTops[slotIndex]}px)`
          })
        }

        function applyState(selectedId) {
          applyPositions(selectedId)

          rows.forEach(row => {
            const isSelected = row.dataset.id === selectedId

            // width emphasis (selected wider, others narrower)
            row.style.width = isSelected ? '100%' : '92%'

            // height
            row.classList.toggle('h-[68px]', isSelected)
            row.classList.toggle('h-[56px]', !isSelected)

            // background emphasis
            row.classList.toggle(
              'bg-[linear-gradient(135deg,rgba(248,250,252,0.92),rgba(226,232,240,0.92))]',
              isSelected
            )
            row.classList.toggle('bg-white/[0.10]', !isSelected)

            // hover
            row.classList.toggle('hover:brightness-95', isSelected)
            row.classList.toggle('hover:bg-white/[0.14]', !isSelected)

            // inner padding
            const inner = row.querySelector('.row-inner')
            inner.classList.toggle('py-2', isSelected)
            inner.classList.toggle('py-1', !isSelected)

            // selected text color (keep Online + green dot unchanged)
            const label = row.querySelector('.label')
            label.classList.toggle('text-white/95', !isSelected)
            label.classList.toggle('text-black', isSelected)

            const desc = row.querySelector('.desc')
            desc.classList.toggle('text-white/70', !isSelected)
            desc.classList.toggle('text-black/70', isSelected)

            // text size tweaks
            label.classList.toggle('text-base', isSelected)
            label.classList.toggle('text-sm', !isSelected)

            desc.classList.toggle('text-sm', isSelected)
            desc.classList.toggle('text-xs', !isSelected)

            const chev = row.querySelector('.chev')
            chev.classList.toggle('text-black/70', isSelected)
            chev.classList.toggle('text-white/55', !isSelected)
          })
        }

        // default selected
        applyState('tech')

        rows.forEach(row => {
          row.addEventListener('click', () => applyState(row.dataset.id))
        })
      </script>
    </main>
  </body>
</html>
